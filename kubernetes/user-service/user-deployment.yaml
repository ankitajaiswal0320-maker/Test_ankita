apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: user
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:

      nodeSelector:
        role: backend

      tolerations:
      - key: "backend"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"

      containers:
      - name: user-service
        image: 509521484072.dkr.ecr.eu-north-1.amazonaws.com/user-service:latest
        ports:
        - containerPort: 5001