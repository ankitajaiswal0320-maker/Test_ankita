apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: order
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:

      nodeSelector:
        role: backend

      tolerations:
      - key: "backend"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"

      containers:
      - name: order-service
        image: 509521484072.dkr.ecr.eu-north-1.amazonaws.com/order-service:latest
        ports:
        - containerPort: 5003